<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NetServer — HTTP Framework Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', monospace;
      background: #0d0d0d;
      color: #e0e0e0;
      padding: 2rem;
      line-height: 1.6;
    }
    .logo { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
    .logo h1 { color: #b48ef7; font-size: 2rem; font-weight: 700; }
    .version {
      font-size: 0.7rem; color: #7a6a9a;
      background: #1a1030; border: 1px solid #3a2a5a;
      padding: 2px 10px; border-radius: 20px;
    }
    .tagline { color: #888; font-size: 0.8rem; margin-bottom: 2rem; }
    .card {
      border: 1px solid #222; border-radius: 10px;
      margin-bottom: 1.5rem; background: #141414; overflow: hidden;
    }
    .card-header {
      display: flex; align-items: center; gap: 12px;
      padding: 1rem 1.5rem; border-bottom: 1px solid #222;
    }
    .method {
      font-size: 0.7rem; font-weight: 700;
      padding: 3px 10px; border-radius: 4px; letter-spacing: 0.5px;
    }
    .get    { background: #1a1535; color: #9b7ff0; border: 1px solid #3a2a70; }
    .post   { background: #0f1f35; color: #6aacf0; border: 1px solid #1a3a60; }
    .delete { background: #2a1015; color: #e07090; border: 1px solid #501525; }
    .route  { color: #c4a8ff; font-size: 0.9rem; font-weight: 600; }
    .card-body { padding: 1.2rem 1.5rem; display: flex; flex-direction: column; gap: 0.8rem; }
    .input-row { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
    input {
      background: #1e1e1e; border: 1px solid #333;
      border-radius: 6px; color: #e0e0e0;
      padding: 0.5rem 0.8rem;
      font-family: 'Courier New', monospace; font-size: 0.82rem;
      flex: 1; outline: none;
    }
    input:focus { border-color: #6040b0; }
    button {
      background: #1e1e1e; color: #e0e0e0;
      border: 1px solid #444; padding: 0.5rem 1.2rem;
      border-radius: 6px; cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 0.82rem; font-weight: 700; white-space: nowrap;
    }
    button:hover { background: #2a2a2a; border-color: #666; }
    .output {
      background: #0d0d0d; border: 1px solid #222;
      border-radius: 6px; padding: 0.8rem 1rem;
      font-size: 0.82rem; line-height: 1.8;
      min-height: 3rem; white-space: pre-wrap; word-break: break-all;
    }
    .status-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 0.5rem; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.ok  { background: #50d090; }
    .status-dot.err { background: #e07090; }
    .status-dot.wait { background: #444; }
    .status-text.ok  { font-size: 0.75rem; color: #50d090; }
    .status-text.err { font-size: 0.75rem; color: #e07090; }
    .status-text.wait { font-size: 0.75rem; color: #666; }
    .status-time { font-size: 0.72rem; color: #555; margin-left: auto; }

    /* JSON syntax colors */
    .j-key   { color: #b48ef7; }
    .j-num   { color: #f0b870; }
    .j-str   { color: #ffffff; }
    .j-bool  { color: #50d090; }
    .j-punct { color: #666; }
  </style>
</head>
<body>

  <div class="logo">
    <h1>⬡ NetServer</h1>
    <span class="version">v1.0</span>
  </div>
  <div class="tagline">HTTP server · built on net · no dependencies</div>

  <div class="card">
    <div class="card-header">
      <span class="method get">GET</span>
      <span class="route">/api/users</span>
    </div>
    <div class="card-body">
      <div class="input-row">
        <button onclick="getUsers()">Fetch all</button>
        <input id="search" placeholder="Search by name...">
        <button onclick="searchUsers()">Search</button>
      </div>
      <div class="output" id="out-get">
        <div class="status-bar">
          <span class="status-dot wait"></span>
          <span class="status-text wait">waiting...</span>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="method post">POST</span>
      <span class="route">/api/users</span>
    </div>
    <div class="card-body">
      <div class="input-row">
        <input id="name" placeholder="Name">
        <input id="email" placeholder="Email">
        <button onclick="createUser()">Create</button>
      </div>
      <div class="output" id="out-post">
        <div class="status-bar">
          <span class="status-dot wait"></span>
          <span class="status-text wait">waiting...</span>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="method delete">DELETE</span>
      <span class="route">/api/users/:id</span>
    </div>
    <div class="card-body">
      <div class="input-row">
        <input id="delid" placeholder="User ID" style="max-width:120px; flex:none;">
        <button onclick="deleteUser()">Delete</button>
      </div>
      <div class="output" id="out-delete">
        <div class="status-bar">
          <span class="status-dot wait"></span>
          <span class="status-text wait">waiting...</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    function colorize(data) {
      const json = JSON.stringify(data, null, 2);
      return json.replace(
        /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?|[{}\[\],:])/g,
        function(match) {
          if (/^"/.test(match)) {
            if (/:$/.test(match)) return '<span class="j-key">' + match + '</span>';
            return '<span class="j-str">' + match + '</span>';
          }
          if (/true|false|null/.test(match)) return '<span class="j-bool">' + match + '</span>';
          if (/[{}\[\],:]/.test(match)) return '<span class="j-punct">' + match + '</span>';
          return '<span class="j-num">' + match + '</span>';
        }
      );
    }

    async function request(method, url, body, outId) {
      const el = document.getElementById(outId);
      const start = Date.now();
      el.innerHTML = '<div class="status-bar"><span class="status-dot" style="background:#f0b870"></span><span class="status-text" style="color:#f0b870;font-size:0.75rem">loading...</span></div>';
      try {
        const opts = { method, headers: {} };
        if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
        const r = await fetch(url, opts);
        const ms = Date.now() - start;
        const data = await r.json();
        const ok = r.ok;
        el.innerHTML =
          `<div class="status-bar">
            <span class="status-dot ${ok ? 'ok' : 'err'}"></span>
            <span class="status-text ${ok ? 'ok' : 'err'}">${r.status} ${r.statusText}</span>
            <span class="status-time">${ms}ms</span>
          </div>` + colorize(data);
      } catch(e) {
        el.innerHTML = '<div class="status-bar"><span class="status-dot err"></span><span class="status-text err" style="font-size:0.75rem">error</span></div>' + e.message;
      }
    }

    function getUsers()    { request('GET', '/api/users', null, 'out-get'); }
    function searchUsers() { request('GET', '/api/users?search=' + encodeURIComponent(document.getElementById('search').value), null, 'out-get'); }
    function createUser()  { request('POST', '/api/users', { name: document.getElementById('name').value, email: document.getElementById('email').value }, 'out-post'); }
    function deleteUser()  { request('DELETE', '/api/users/' + document.getElementById('delid').value, null, 'out-delete'); }
  </script>

</body>
</html>
